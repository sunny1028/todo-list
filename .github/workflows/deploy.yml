name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ghcr.io/sunny1028/todo-backend:${{ github.ref_name }} ./backend
          docker push ghcr.io/sunny1028/todo-backend:${{ github.ref_name }}

      - name: Build and push frontend image
        run: |
          docker build -t ghcr.io/sunny1028/todo-frontend:${{ github.ref_name }} ./frontend
          docker push ghcr.io/sunny1028/todo-frontend:${{ github.ref_name }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=accept-new -p 20004 root@218.4.33.10 << 'DEPLOY'
            set -e
            TAG=${{ github.ref_name }}

            docker network create todo-net 2>/dev/null || true

            docker stop todo-backend 2>/dev/null || true
            docker stop todo-frontend 2>/dev/null || true
            docker rm todo-backend 2>/dev/null || true
            docker rm todo-frontend 2>/dev/null || true

            docker pull ghcr.io/sunny1028/todo-backend:${TAG}
            docker pull ghcr.io/sunny1028/todo-frontend:${TAG}

            docker run -d --name todo-backend \
              --network todo-net \
              -p 8078:8080 \
              -v /data/work/sunbo/todo-list:/app/data \
              -e PORT=8080 \
              -e DB_PATH=/app/data/todo.db \
              -e CORS_ORIGIN=* \
              --restart unless-stopped \
              ghcr.io/sunny1028/todo-backend:${TAG}

            docker run -d --name todo-frontend \
              --network todo-net \
              -p 8079:80 \
              --restart unless-stopped \
              ghcr.io/sunny1028/todo-frontend:${TAG}

            docker image prune -f
            docker ps
          DEPLOY
