name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -t todo-backend:${{ github.ref_name }} ./backend

      - name: Build frontend image
        run: |
          docker build -t todo-frontend:${{ github.ref_name }} ./frontend

      - name: Save and compress images
        run: |
          TAG=${{ github.ref_name }}
          docker save todo-backend:${TAG} | gzip > backend-${TAG}.tar.gz
          docker save todo-frontend:${TAG} | gzip > frontend-${TAG}.tar.gz
          ls -lh *.tar.gz

      - name: Upload to OSS
        run: |
          TAG=${{ github.ref_name }}
          ENDPOINT=${{ secrets.OSS_ENDPOINT }}
          BUCKET=${{ secrets.OSS_BUCKET_NAME }}
          curl -fsSL -o ossutil64 https://gosspublic.alicdn.com/ossutil/1.7.21/ossutil64
          chmod +x ossutil64
          ./ossutil64 config -e https://${ENDPOINT} -i ${{ secrets.OSS_ACCESS_KEY }} -k ${{ secrets.OSS_SECRET_KEY }} -L EN -c ./ossconfig
          ./ossutil64 cp backend-${TAG}.tar.gz oss://${BUCKET}/images/todo-deploy/backend-${TAG}.tar.gz -c ./ossconfig -f --acl public-read
          ./ossutil64 cp frontend-${TAG}.tar.gz oss://${BUCKET}/images/todo-deploy/frontend-${TAG}.tar.gz -c ./ossconfig -f --acl public-read

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=accept-new -p 20004 root@218.4.33.10 << 'DEPLOY'
            set -e
            TAG=${{ github.ref_name }}
            BUCKET=${{ secrets.OSS_BUCKET_NAME }}
            ENDPOINT=${{ secrets.OSS_ENDPOINT }}

            BASE_URL="https://${BUCKET}.${ENDPOINT}/images/todo-deploy"

            docker network create todo-net 2>/dev/null || true

            docker stop todo-backend 2>/dev/null || true
            docker stop todo-frontend 2>/dev/null || true
            docker rm todo-backend 2>/dev/null || true
            docker rm todo-frontend 2>/dev/null || true

            curl -fsSL -o /tmp/backend.tar.gz "${BASE_URL}/backend-${TAG}.tar.gz"
            curl -fsSL -o /tmp/frontend.tar.gz "${BASE_URL}/frontend-${TAG}.tar.gz"

            gunzip -c /tmp/backend.tar.gz | docker load
            gunzip -c /tmp/frontend.tar.gz | docker load

            docker run -d --name todo-backend \
              --network todo-net \
              -p 8078:8080 \
              -v /data/work/sunbo/todo-list:/app/data \
              -e PORT=8080 \
              -e DB_PATH=/app/data/todo.db \
              -e CORS_ORIGIN=* \
              --restart unless-stopped \
              todo-backend:${TAG}

            docker run -d --name todo-frontend \
              --network todo-net \
              -p 8079:80 \
              --restart unless-stopped \
              todo-frontend:${TAG}

            rm -f /tmp/backend.tar.gz /tmp/frontend.tar.gz
            docker image prune -f
            docker ps
          DEPLOY
