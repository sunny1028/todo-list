name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ secrets.HARBOR_HOST }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build and push backend image
        run: |
          TAG=${{ github.ref_name }}
          REGISTRY=${{ secrets.HARBOR_HOST }}
          IMAGE="${REGISTRY}/sunbo22/todo-backend:${TAG}"
          docker build -t ${IMAGE} ./backend
          docker push ${IMAGE}

      - name: Build and push frontend image
        run: |
          TAG=${{ github.ref_name }}
          REGISTRY=${{ secrets.HARBOR_HOST }}
          IMAGE="${REGISTRY}/sunbo22/todo-frontend:${TAG}"
          docker build -t ${IMAGE} ./frontend
          docker push ${IMAGE}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=accept-new -p 20004 root@218.4.33.10 << 'DEPLOY'
            set -e
            TAG=${{ github.ref_name }}
            REGISTRY=${{ secrets.HARBOR_HOST }}
            ACR_PASSWORD=${{ secrets.HARBOR_PASSWORD }}
            ACR_USERNAME=${{ secrets.HARBOR_USERNAME }}

            echo "${ACR_PASSWORD}" | docker login ${REGISTRY} -u ${ACR_USERNAME} --password-stdin

            docker network create todo-net 2>/dev/null || true

            docker stop todo-backend 2>/dev/null || true
            docker stop todo-frontend 2>/dev/null || true
            docker rm todo-backend 2>/dev/null || true
            docker rm todo-frontend 2>/dev/null || true

            docker pull ${REGISTRY}/sunbo22/todo-backend:${TAG}
            docker pull ${REGISTRY}/sunbo22/todo-frontend:${TAG}

            docker run -d --name todo-backend \
              --network todo-net \
              -p 8078:8080 \
              -v /data/work/sunbo/todo-list:/app/data \
              -e PORT=8080 \
              -e DB_PATH=/app/data/todo.db \
              -e CORS_ORIGIN=* \
              --restart unless-stopped \
              ${REGISTRY}/sunbo22/todo-backend:${TAG}

            docker run -d --name todo-frontend \
              --network todo-net \
              -p 8079:80 \
              --restart unless-stopped \
              ${REGISTRY}/sunbo22/todo-frontend:${TAG}

            docker image prune -f
            docker ps
          DEPLOY
