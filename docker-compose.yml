services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - todo-data:/app
    environment:
      - DB_PATH=/app/todo.db
      - CORS_ORIGIN=http://localhost

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  todo-data:
